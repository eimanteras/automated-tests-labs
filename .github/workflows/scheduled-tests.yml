name: Scheduled Playwright Tests

on:
  schedule:
    - cron: "03 19 * * *"   # 20:56 LT
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (with traces on first retry)
        run: npx playwright test --trace on-first-retry --reporter=line,html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload raw test-results (traces/screens)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results