name: Scheduled Newman Gmail Tests

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  newman-gmail:
    runs-on: ubuntu-latest
    if: ${{ secrets.GMAIL_OAUTH_CLIENT_ID != '' && secrets.GMAIL_OAUTH_CLIENT_SECRET != '' && secrets.GMAIL_OAUTH_REFRESH_TOKEN != '' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Prepare report directory
        run: mkdir -p test-results/newman

      - name: Get OAuth access token from refresh token
        id: oauth
        run: |
          TOKEN_RESPONSE=$(curl -sS -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.GMAIL_OAUTH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.GMAIL_OAUTH_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.GMAIL_OAUTH_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin).get('access_token',''))")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access_token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run Gmail API collection with Newman
        run: |
          newman run postman/gmail-automation.postman_collection.json \
            -e postman/gmail-automation.postman_environment.json \
            --env-var "oauthToken=${{ steps.oauth.outputs.access_token }}" \
            --env-var "mailFrom=${{ secrets.GMAIL_MAIL_FROM }}" \
            --env-var "mailTo=${{ secrets.GMAIL_MAIL_TO }}" \
            --reporters cli,json,htmlextra \
            --reporter-json-export test-results/newman/newman-report.json \
            --reporter-htmlextra-export test-results/newman/newman-report.html

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-gmail-report
          path: test-results/newman
